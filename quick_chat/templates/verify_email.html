<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickChat - Verify Email</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <rect width="40" height="40" rx="12" fill="#6c63ff"/>
                        <path d="M12 14h16v2H12zm0 5h12v2H12zm0 5h8v2H12z" fill="white"/>
                    </svg>
                </div>
                <h1>Verify your email</h1>
                <p class="subtitle">Enter the code we sent to <strong>{{ email }}</strong>.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('verify_email') }}" class="auth-form">
                <div class="form-group">
                    <label for="otp">Verification code</label>
                    <input type="text" id="otp" name="otp" placeholder="Enter the code" required maxlength="6" minlength="6">
                </div>
                <button type="submit" class="btn-primary">Verify email</button>

                <div style="margin-top: 0.75rem; text-align: center;">
                    <span style="color:#6b7280; font-size:0.85rem;">Didn’t get a code?</span>
                    <button type="submit" name="action" value="resend" class="btn-secondary" style="margin-top:0.5rem;">Resend code</button>
                </div>
            </form>

            <div class="auth-footer">
                <p>Already verified? <a href="{{ url_for('login') }}">Sign in</a></p>
            </div>
        </div>
    </div>
</body>
</html>
