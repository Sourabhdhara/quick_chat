<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickChat - Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <rect width="40" height="40" rx="12" fill="#6c63ff"/>
                        <path d="M12 14h16v2H12zm0 5h12v2H12zm0 5h8v2H12z" fill="white"/>
                    </svg>
                </div>
                <h1>Forgot password</h1>
                <p class="subtitle">Enter your username and we’ll send an OTP to your registered email.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('forgot_password') }}" class="auth-form">
                <div class="form-group">
                    <label for="identifier">Email or Username</label>
                    <input type="text" id="identifier" name="identifier" placeholder="Your email or username" required autofocus>
                </div>
                <button type="submit" class="btn-primary">Send OTP</button>
            </form>

            <div class="auth-footer">
                <p>Remembered your password? <a href="{{ url_for('login') }}">Sign in</a></p>
            </div>
        </div>
    </div>
</body>
</html>
